<!DOCTYPE html>
<html lang="en" data-theme="light" id="htmlRoot">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0b3d26"/>
<title>{% block title %}Paradise Resort{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
{% block extra_css %}{% endblock %}
</head>
<body>
<a href="#main-content" class="skip-nav">Skip to main content</a>
<div id="toastWrap"></div>

<!-- Session timeout warning modal -->
<div class="modal-bg" id="sessionModal" style="display:none">
  <div class="modal-box" style="max-width:380px;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:.75rem">⏰</div>
    <h3 style="margin-bottom:.5rem">Session Expiring Soon</h3>
    <p style="color:var(--t1);margin-bottom:1.25rem">Your session expires in <strong id="sessionCountdown">10:00</strong>. Stay logged in?</p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button onclick="extendSession()" class="btn btn-primary">Stay Logged In</button>
      <a href="{{ url_for('auth.logout') }}" class="btn btn-ghost">Logout Now</a>
    </div>
  </div>
</div>

{% block body %}{% endblock %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
// Dark mode init (before render to avoid flash)
(function(){
  const t = localStorage.getItem('theme') || 'light';
  document.getElementById('htmlRoot').setAttribute('data-theme', t);
})();

// Session timeout (2hr session, warn at 10min remaining)
(function(){
  const SESSION_MS  = 2 * 60 * 60 * 1000;
  const WARN_BEFORE = 10 * 60 * 1000;
  const WARN_AT     = SESSION_MS - WARN_BEFORE;

  {% if session.get('user') %}
  let warnTimer = setTimeout(showSessionWarning, WARN_AT);
  let countdownInterval;

  window.extendSession = function() {
    fetch('{{ url_for("auth.ping") }}', {method:'POST', headers:{'X-CSRFToken':'{{ csrf_token() }}','Content-Type':'application/json'}, body:'{}'})
      .then(() => {
        document.getElementById('sessionModal').style.display = 'none';
        clearInterval(countdownInterval);
        clearTimeout(warnTimer);
        warnTimer = setTimeout(showSessionWarning, WARN_AT);
      });
  };

  function showSessionWarning() {
    document.getElementById('sessionModal').style.display = 'flex';
    let remaining = 10 * 60;
    const el = document.getElementById('sessionCountdown');
    countdownInterval = setInterval(() => {
      remaining--;
      const m = Math.floor(remaining/60).toString().padStart(2,'0');
      const s = (remaining%60).toString().padStart(2,'0');
      if(el) el.textContent = m+':'+s;
      if(remaining <= 0) { clearInterval(countdownInterval); window.location.href='{{ url_for("auth.logout") }}'; }
    }, 1000);
  }
  {% endif %}
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
